<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://gitee.com/liveup_admin/ft2/raw/master/template/js/notebook.css">
    <script src="https://gitee.com/liveup_admin/ft2/raw/master/template/js/vue.global.prod.js"></script>
    <script src="https://gitee.com/liveup_admin/ft2/raw/master/template/js/ft-table.js"></script>
    <script src="https://gitee.com/liveup_admin/ft2/raw/master/template/js/echarts.min.js"></script>
    <script src="https://gitee.com/liveup_admin/ft2/raw/master/template/js/snapdom.min.js"></script>
</head>
<body>
    {% raw %}
    <div id="app">
        <!-- Toast 提示容器 -->
        <div class="toast-container" v-if="toastMessage">
            <div class="toast" :class="toastType">{{ toastMessage }}</div>
        </div>
        
        <!-- 整体居中 wrapper -->
        <div class="notebook-wrapper">
            <!-- 主体容器 -->
            <div class="notebook-container">
                <!-- 头部 -->
                <div class="notebook-header">
                    <h1>{{ title }}</h1>
                    <div class="meta">
                        <span>📅 {{ createdAt }}</span>
                    </div>
                </div>
                
                <!-- 内容区域 -->
                <cell-renderer 
                    v-for="(cell, index) in cells" 
                    :key="index"
                    :cell="cell"
                    :cell-id="index"
                    :level="0">
                </cell-renderer>
            </div>
            
            <!-- TOC 目录面板 -->
            <aside class="toc-panel" v-if="tocItems.length > 0">
                <div class="toc-header">📑 目录</div>
                <ul class="toc-list">
                    <li 
                        v-for="(item, index) in tocItems" 
                        :key="index"
                        class="toc-item"
                        :class="{ selected: isSelected(item.index) }"
                        @click="scrollToSection(item.index)">
                        <input 
                            type="checkbox" 
                            :checked="isSelected(item.index)"
                            @click.stop="toggleSelection(item.index)">
                        <span>{{ item.title }}</span>
                    </li>
                </ul>
                <div class="toc-actions">
                    <button @click="selectAll">全选</button>
                    <button @click="clearSelection">清空</button>
                    <button @click="captureScreenshot" :disabled="selectedCount === 0">截图选中</button>
                </div>
                <div class="toc-footer">
                    <button @click="captureAll" class="full-btn">📋 全页截图</button>
                </div>
            </aside>
        </div>
            
            <!-- 配色选择面板 -->
            <div class="color-picker-panel">
                <div class="color-picker-toggle" @click="toggleColorPicker">
                    🎨 配色选择
                </div>
                <div class="color-picker-content" v-show="showColorPicker">
                    <div class="color-picker-header">
                        <h4>选择图表配色方案</h4>
                    </div>
                    <div class="color-picker-body">
                        <div class="color-palette-group">
                            <h5>全局配色</h5>
                            <div class="color-palette-options">
                                <button 
                                    v-for="(palette, key) in colorPalettes.palettes" 
                                    :key="key"
                                    :class="['color-palette-btn', { active: colorPalettes.global === key }]"
                                    @click="setColorPalette('global', key)"
                                >
                                    <div class="palette-colors">
                                        <span 
                                            v-for="(color, index) in palette.colors.slice(0, 4)" 
                                            :key="index"
                                            class="palette-color" 
                                            :style="{ backgroundColor: color }"
                                        ></span>
                                    </div>
                                    <span class="palette-name">{{ palette.name }}</span>
                                </button>
                            </div>
                        </div>
                        <div class="color-palette-group">
                            <h5>按图表类型</h5>
                            <div class="color-palette-options">
                                <div class="chart-type-picker">
                                    <label>折线图:</label>
                                    <select v-model="colorPalettes.types.line" @change="updateChartColors">
                                        <option v-for="(palette, key) in colorPalettes.palettes" :key="key" :value="key">
                                            {{ palette.name }}
                                        </option>
                                    </select>
                                </div>
                                <div class="chart-type-picker">
                                    <label>柱状图:</label>
                                    <select v-model="colorPalettes.types.bar" @change="updateChartColors">
                                        <option v-for="(palette, key) in colorPalettes.palettes" :key="key" :value="key">
                                            {{ palette.name }}
                                        </option>
                                    </select>
                                </div>
                                <div class="chart-type-picker">
                                    <label>饼图:</label>
                                    <select v-model="colorPalettes.types.pie" @change="updateChartColors">
                                        <option v-for="(palette, key) in colorPalettes.palettes" :key="key" :value="key">
                                            {{ palette.name }}
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    </div>
    {% endraw %}

    <!-- Notebook 数据注入（Jinja2 渲染） -->
    <script id="notebook-data" type="application/json">{{ data_json | safe }}</script>
    
    <!-- Notebook Vue3 JS -->
    <script src="https://gitee.com/liveup_admin/ft2/raw/master/template/js/notebook-vue3.js"></script>
    <script>
        // 从 Jinja2 注入的数据创建配置
        const dataElement = document.getElementById('notebook-data');
        window.notebookConfig = dataElement ? JSON.parse(dataElement.textContent) : {
            title: '未命名 Notebook',
            createdAt: new Date().toLocaleString(),
            cells: []
        };
        
        // 创建并挂载应用
        createNotebookApp().mount('#app');
    </script>
</body>
</html>
